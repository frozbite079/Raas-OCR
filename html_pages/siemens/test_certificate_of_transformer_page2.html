<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST CERTIFICATE OF TRANSFORMER - PAGE 2</title>
    <meta name="description"
        content="Professional VCB and HT Panel maintenance checklists with editable fields and print-ready layout.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #003366;
            --secondary-color: #007bb8;
            --border-color: #333;
            --bg-color: #f4f7f9;
            --page-bg: #ffffff;
            --text-color: #1a1a1a;
            --editable-bg: #fffdf2;
        }

        * {
            box-sizing: border-box;
            -webkit-print-color-adjust: exact;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        /* Page Container */
        .page-container {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 50px;
        }

        .report-page {
            background: var(--page-bg);
            padding: 40px;
            min-height: 297mm;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-radius: 4px;
            position: relative;
            width: 100%;
        }

        /* Header Styles */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .sp-logo {
            display: flex;
            align-items: center;
        }

        .siemens-brand {
            text-align: right;
        }

        .siemens-logo {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 24px;
            color: #00828a;
            letter-spacing: -1px;
            line-height: 1;
        }

        .siemens-sub {
            font-size: 8px;
            color: #666;
            text-transform: uppercase;
        }

        /* Table Styles */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
            font-size: 11px;
        }

        th,
        td {
            border: 1px solid var(--border-color);
            padding: 6px 8px;
            text-align: left;
        }

        .main-title-cell {
            text-transform: uppercase;
            font-size: 14px;
            padding: 10px !important;
            background-color: #fff;
        }

        .section-header {
            font-size: 12px;
            font-weight: 700;
            margin: 15px 0 5px 0;
            display: flex;
            align-items: baseline;
        }

        .section-header span {
            margin-right: 10px;
        }

        .bg-gray {
            background-color: #f9f9f9;
        }

        .text-center {
            text-align: center;
        }

        .font-bold {
            font-weight: 600;
        }

        /* Editable Styles */
        [contenteditable="true"] {
            outline: none;
            min-height: 1.2em;
            cursor: text;
            transition: background-color 0.2s;
        }

        [contenteditable="true"]:hover {
            background-color: rgba(0, 123, 184, 0.05);
        }

        [contenteditable="true"]:focus {
            background-color: #fff;
            box-shadow: inset 0 0 0 1px var(--secondary-color);
        }

        /* Action Buttons */
        .actions {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-print {
            background-color: var(--primary-color);
            color: white;
        }

        @media print {
            .actions {
                display: none;
            }

            [contenteditable="true"]:focus {
                box-shadow: none;
            }

            body {
                background: none;
                padding: 0;
                gap: 0;
            }

            .report-page {
                box-shadow: none;
                margin: 0;
                padding: 10mm;
                page-break-after: always;
                border: none;
            }

            .page-container {
                gap: 0;
            }
        }

        /* Specific Table Layouts */
        .info-table td {
            width: 15%;
        }

        .info-table td:nth-child(even) {
            width: 35%;
        }
    </style>
</head>

<body>

    <div class="page-container">
        <!-- PAGE 7: TRANSFORMER TEST CERTIFICATE (PART 2) -->
        <div id="transformer-test-2" class="report-page">
            <div class="header">
                <div class="sp-logo">
                    <div style="border: 2px solid #003366; padding: 2px; width: 80px; text-align: center;">
                        <span style="font-size: 28px; font-weight: 900; color: #003366;">S & P</span>
                        <div
                            style="font-size: 6px; color: #003366; border-top: 1px solid #003366; margin-top: 2px; padding-top: 2px;">
                            Elec Infra Pvt. Ltd.</div>
                    </div>
                </div>
                <div class="siemens-brand">
                    <div class="siemens-logo">SIEMENS</div>
                    <div class="siemens-sub">Authorized Distributor of RMU & CSS</div>
                </div>
            </div>

            <div class="section-header">WINDING RESISTANCE :</div>
            <table>
                <tr class="bg-gray text-center font-bold">
                    <td>TAP NO.</td>
                    <td>1U1V</td>
                    <td>1V1W</td>
                    <td>1U1W</td>
                    <td>2U2N</td>
                    <td>2V2N</td>
                    <td>2W2N</td>
                </tr>
                <tr class="text-center">
                    <td>3</td>
                    <td contenteditable="true" data-field="WR 1U1V"></td>
                    <td contenteditable="true" data-field="WR 1V1W"></td>
                    <td contenteditable="true" data-field="WR 1U1W"></td>
                    <td contenteditable="true" data-field="WR 2U2N"></td>
                    <td contenteditable="true" data-field="WR 2V2N"></td>
                    <td contenteditable="true" data-field="WR 2W2N"></td>
                </tr>
            </table>

            <div class="section-header">INSULATION RESISTANCE :</div>
            <table>
                <tr class="bg-gray text-center font-bold">
                    <td>HT TO EARTH</td>
                    <td>LT TO EARTH</td>
                    <td>HT TO LT</td>
                </tr>
                <tr class="text-center font-bold">
                    <td>5000 V</td>
                    <td>1000 V</td>
                    <td>5000 V</td>
                </tr>
                <tr class="text-center">
                    <td contenteditable="true" data-field="IR HT TO EARTH"></td>
                    <td contenteditable="true" data-field="IR LT TO EARTH"></td>
                    <td contenteditable="true" data-field="IR HT TO LT"></td>
                </tr>
            </table>

            <div style="margin-top: 30px; font-size: 11px;">
                <span class="font-bold">Remark : TESTED OK</span>
            </div>
        </div>
    </div>
</body>

</html>
